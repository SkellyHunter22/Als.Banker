mysql:
  url: "jdbc:mysql://localhost:3306/ecoxpert_inf"
  user: "root"
  password: ""

interval_minutes: 60

# Ongoing daily interest/penalty charged on the outstanding balance for every day a
# schedule stays unpaid past its due date. Applied at most once per calendar day,
# no matter how often interval_minutes runs the check.
penalty_rate: 0.02
penalty_cap_fraction: 0.50

# One-time flat fee charged the moment an installment first becomes overdue,
# separate from the ongoing daily penalty above.
late_fee:
  rate: 0.10       # fraction of the missed installment's amount_due
  min_amount: 10.0 # fee is never lower than this, even on tiny installments

interest:
  mode: "outstanding" # outstanding | principal | average

loan:
  max_amount: 5000.0
  interest_rate: 0.05
  installments: 3
  installment_interval_days: 3

# Savings account: /savings deposit|withdraw pulls from/pushes to the player's Vault
# wallet. Interest is credited once per calendar day on whatever is deposited.
savings:
  interest_rate: 0.01 # 1% per day

# Virtual stock market: /stocks buy|sell trades against the player's Vault wallet.
stocks:
  fluctuation_interval_minutes: 30
  max_change_percent: 0.05 # each cycle, price moves by up to +/-5%
  min_price: 0.50

discord_webhook: ""
discord_bot_token: ""

discord_links: {}

# /steal <player>: a timing minigame (catch a moving marker on the right slot)
# that lets a player pickpocket some of another online player's Vault balance.
theft:
  enabled: true
  cooldown_seconds: 300          # how often a player can attempt a heist at all
  fail_cooldown_multiplier: 2    # cooldown is multiplied by this after a failed attempt
  victim_cooldown_seconds: 600   # a given victim can't be robbed again this soon
  max_distance: 5                # blocks; thief must be this close to the victim
  min_target_balance: 100.0      # victim must have at least this much to be worth robbing
  steal_percent: 0.15            # fraction of the victim's balance at stake
  max_steal_amount: 500.0        # hard cap on a single successful theft
  fail_fine_percent: 0.05        # fraction of the stake the thief pays the victim on failure
  marker_speed_ticks: 4          # lower = marker moves faster = harder

# Credit score (300-850) gates how much a player can borrow via /loan and
# /creditcard. Paying down debt raises it; missing payments or carrying a high
# card balance lowers it. Check yours with /loan credit.
credit:
  starting_score: 650
  min_score: 300
  max_score: 850

  min_score_for_loan: 500
  min_score_for_card: 500

  # Loan/card caps by score tier (on top of loan.max_amount as an absolute ceiling).
  tier1_min_score: 500
  loan_tier1_max: 1000.0
  credit_card_tier1_max: 500.0
  tier2_min_score: 650
  loan_tier2_max: 2500.0
  credit_card_tier2_max: 1500.0
  tier3_min_score: 750
  loan_tier3_max: 5000.0
  credit_card_tier3_max: 3000.0

  score_gain_on_time_payment: 5
  score_gain_loan_paid_off: 20
  score_gain_savings_deposit: 2
  score_gain_card_payment: 3
  score_loss_late_fee: 15
  score_loss_daily_penalty: 5
  score_loss_high_utilization: 3

# /creditcard apply|info|charge|pay: a revolving credit line (unlike /loan's
# fixed installments) gated by the credit score above.
credit_card:
  daily_apr: 0.001                  # daily interest rate on any carried balance
  high_utilization_threshold: 0.5   # balance/limit ratio that starts hurting your score each day
