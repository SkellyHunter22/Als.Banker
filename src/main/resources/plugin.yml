name: EcoLoanScheduler
version: 2.0
main: com.alexander.ecoloanscheduler.EcoLoanScheduler
api-version: 1.20
author: Alexander
description: Full loan scheduler replacement for EcoXpert with Discord integration.

commands:
  loanscheduler:
    description: Admin controls
    permission: ecoloanscheduler.admin

  linkdiscord:
    description: Link your Discord account
    permission: ecoloanscheduler.user

  unlinkdiscord:
    description: Unlink your Discord account
    permission: ecoloanscheduler.user

permissions:
  ecoloanscheduler.admin:
    default: op
  ecoloanscheduler.user:
    default: true
